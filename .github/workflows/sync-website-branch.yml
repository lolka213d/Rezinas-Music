name: Sync website branch

# Keeps the `website` branch in sync with website/ folder from `mine`.
on:
  push:
    branches: [mine]
    paths:
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mine
          fetch-depth: 0

      - name: Push website/ to website branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git subtree split --prefix=website -b website-deploy
          git push origin website-deploy:website --force
